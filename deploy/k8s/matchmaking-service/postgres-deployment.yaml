apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking-db
  namespace: onlinegame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchmaking-db
  template:
    metadata:
      labels:
        app: matchmaking-db
    spec:
      containers:
        - name: matchmaking-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: onlinegame_matchmaking
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
