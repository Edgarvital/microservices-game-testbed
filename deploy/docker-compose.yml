services:
  auth-db:
    image: postgres:16-alpine
    container_name: onlinegame-auth-db
    environment:
      POSTGRES_DB: onlinegame_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres-auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: onlinegame-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: onlinegame-auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AUTH_DB_CONNECTION: Host=auth-db;Port=5432;Database=onlinegame_auth;Username=postgres;Password=postgres
      JWT_SECRET: CHANGE_ME_BASELINE_LOCAL_SECRET_32B
      Secrets__Provider: Local
      Jwt__AccessTokenTtlMinutes: 120
    ports:
      - "8080:8080"

  inventory-db:
    image: postgres:16-alpine
    container_name: onlinegame-inventory-db
    environment:
      POSTGRES_DB: onlinegame_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./docker-data/postgres-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  inventory-service:
    build:
      context: ../services/inventory-service
      dockerfile: Dockerfile
    container_name: onlinegame-inventory-service
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__InventoryDb: Host=inventory-db;Port=5432;Database=onlinegame_inventory;Username=postgres;Password=postgres
      Jwt__Secret: CHANGE_ME_BASELINE_LOCAL_SECRET_32B
    ports:
      - "8081:8080"

  matchmaking-db:
    image: postgres:16-alpine
    container_name: onlinegame-matchmaking-db
    environment:
      POSTGRES_DB: onlinegame_matchmaking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./docker-data/postgres-matchmaking:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  matchmaking-service:
    build:
      context: ../services/matchmaking-service
      dockerfile: Dockerfile
    container_name: onlinegame-matchmaking-service
    depends_on:
      matchmaking-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MatchmakingDb: Host=matchmaking-db;Port=5432;Database=onlinegame_matchmaking;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
    ports:
      - "8082:8080"
